---
- name: Ensure rsyslog installed
  ansible.builtin.apt:
    name: rsyslog
    state: present
    update_cache: true

- name: Ensure journald drop-in dir
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure persistent journald
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/softage.conf
    content: |
      [Journal]
      Storage=persistent
      SystemMaxUse=500M
    owner: root
    group: root
    mode: "0644"
  notify: restart journald

- name: Configure remote syslog forwarding
  ansible.builtin.template:
    src: 60-remote.conf.j2
    dest: /etc/rsyslog.d/60-remote.conf
    mode: "0644"
  when: remote_syslog_enabled | bool
  notify: restart rsyslog
